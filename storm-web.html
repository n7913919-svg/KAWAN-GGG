<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STORM GAME</title>
<link rel="stylesheet" href="game.css">
</head>
<body>

  <!-- BAR HP PLAYER 1 -->
    <p>BADAI PINK</p>
<div class="hp-box">
    <div class="hp-bar">
        <div id="hp1" class="hp-fill"></div>
    </div>
</div>

<!-- BAR HP PLAYER 2 -->
<div class="hp-box hp2">
    <p>BADAI COKLAT</p>
    <div class="hp-bar">
        <div id="hp2" class="hp-fill"></div>
    </div>
</div>
  <div id="lirik">STORM MODE ON</div>
  <img id="char" src="../assets/char1.png">
  <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const char = document.getElementById('char');
const lirik = document.getElementById('lirik');

let hujan = []; let toggle = false;
for(let i=0; i<200; i++){
  hujan.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, speed: 4 + Math.random()*5})
}

setInterval(()=>{
  toggle = !toggle;
  if(toggle){
    char.src = "../assets/char2.png";
    lirik.textContent = "BADAI DATANG!!";
  } else {
    char.src = "../assets/char1.png";
    lirik.textContent = "STORM MODE ON";
  }
}, 2000)

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = "rgba(77,232,224,0.5)";
  hujan.forEach(r =>{
    ctx.beginPath(); ctx.moveTo(r.x, r.y); ctx.lineTo(r.x, r.y + 15); ctx.stroke();
    r.y += r.speed; if(r.y > canvas.height) r.y = 0;
  })
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
